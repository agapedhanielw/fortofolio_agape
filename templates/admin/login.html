<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Portofolio</title>
    <!-- Memanggil Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Khusus Login (Biar elegan dan aman dari bentrok) -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 380px; 
        }
        .login-box h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            color: #1a1a1a; 
            font-size: 1.8rem;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #444; 
            font-size: 0.95rem; 
            font-weight: 500;
        }
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit; 
            transition: 0.3s;
        }
        .input-group input:focus { 
            border-color: #1a1a1a; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(26,26,26,0.1);
        }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #1a1a1a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 1rem; 
            transition: 0.3s; 
            margin-top: 10px; 
        }
        .btn-login:hover { background: #333; }
        .error-msg { 
            color: #d32f2f; 
            background: #ffebee; 
            padding: 12px; 
            border-radius: 8px; 
            text-align: center; 
            margin-bottom: 20px; 
            font-size: 0.9rem; 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Admin Panel</h2>
        
        <!-- Pesan Error Jika Salah Password -->
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <!-- PERHATIKAN: action sudah diarahkan ke /admin -->
        <form method="POST" action="/admin">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Masukkan username..." required autofocus>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Masukkan password..." required>
            </div>
            
            <button type="submit" class="btn-login">Masuk Dashboard</button>
        </form>
    </div>

</body>
</html>
