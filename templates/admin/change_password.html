{% extends 'admin/base.html' %}

{% block content %}
<!-- CSS MANDIRI KHUSUS FORM PASSWORD (Anti-Hancur) -->
<style>
    .pw-card-container {
        max-width: 500px;
        margin: 50px auto;
        background: #ffffff;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .pw-header-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 25px;
        color: #1a1a1a;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 15px;
    }
    .pw-input-group {
        margin-bottom: 20px;
    }
    .pw-label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        color: #444;
        font-size: 14px;
    }
    .pw-input-field {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #dcdcdc;
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }
    .pw-input-field:focus {
        border-color: #000;
        outline: none;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
    }
    .pw-button-area {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 30px;
    }
    .pw-btn-back {
        color: #666;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: color 0.3s;
    }
    .pw-btn-back:hover {
        color: #000;
    }
    .pw-btn-save {
        background: #1a1a1a;
        color: #fff;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s, transform 0.1s;
    }
    .pw-btn-save:hover { background: #333; }
    .pw-btn-save:active { transform: scale(0.97); }
    
    /* Notifikasi Pesan Flash */
    .pw-alert {
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 25px;
        font-size: 14px;
        font-weight: 500;
    }
    .pw-alert-error {
        background-color: #fff2f2;
        color: #d32f2f;
        border-left: 4px solid #d32f2f;
    }
    .pw-alert-success {
        background-color: #f0fdf4;
        color: #15803d;
        border-left: 4px solid #15803d;
    }
</style>

<div class="pw-card-container">
    <h2 class="pw-header-title">Keamanan Akun: Ganti Password</h2>

    <!-- Tangkap Pesan Flash dari Python (Error / Success) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="pw-alert {% if category == 'error' %}pw-alert-error{% else %}pw-alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_bp.change_password') }}">
        <div class="pw-input-group">
            <label class="pw-label">Password Lama</label>
            <input type="password" name="old_password" class="pw-input-field" placeholder="Masukkan password saat ini" required>
        </div>
        <div class="pw-input-group">
            <label class="pw-label">Password Baru</label>
            <input type="password" name="new_password" class="pw-input-field" placeholder="Masukkan password baru" required>
        </div>
        <div class="pw-input-group">
            <label class="pw-label">Konfirmasi Password Baru</label>
            <input type="password" name="confirm_password" class="pw-input-field" placeholder="Ketik ulang password baru" required>
        </div>
        <div class="pw-button-area">
            <a href="{{ url_for('admin_bp.dashboard') }}" class="pw-btn-back">← Kembali ke Dashboard</a>
            <button type="submit" class="pw-btn-save">Simpan Password</button>
        </div>
    </form>
</div>
{% endblock %}
