<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Portofolio Agape</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Menu -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Agape</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/profiles">Profil</a></li>
                <li><a href="/admin/skills">Skill</a></li>
                <li><a href="/admin/experiences">Pengalaman</a></li>
                <li><a href="/admin/projects">Proyek</a></li>
                <li><a href="/admin/logout" class="logout-btn">Logout</a></li>
            </ul>
        </aside>

        <!-- Konten Utama (Berubah-ubah sesuai halaman) -->
        <main class="main-content">
            {% block content %}
            <!-- Konten dari file lain akan masuk ke sini -->
            {% endblock %}
        </main>
    </div>
</body>
</html>
